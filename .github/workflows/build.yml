name: Build & Release

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - "v*"
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "gradle"

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build --no-daemon

      - name: Upload JAR as artifact
        uses: actions/upload-artifact@v4
        with:
          name: WastelandArtifacts
          path: build/libs/WastelandArtifacts-*.jar

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: WastelandArtifacts
          path: .

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Wasteland Artifacts v${{ steps.get_version.outputs.VERSION }}"
          body: |
            ## 🏜️ Wasteland Artifacts v${{ steps.get_version.outputs.VERSION }}

            ### 🚀 Установка
            1. Скачай JAR снизу
            2. Помести в `plugins/`
            3. Перезапусти сервер

            ### 🔄 Изменения
            Смотри [CHANGELOG](https://github.com/${{ github.repository }}/commits/main/)
          files: |
            WastelandArtifacts-*.jar
          draft: false
          prerelease: false
