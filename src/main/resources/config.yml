# ─── Wasteland Artifacts — Главный конфиг ───

features:
  placeholderAPI: true
  mythicmobs: true
  nexo: true
  oraxen: true
  collection: true
  artifactSets: true
  activeAbilities: true
  upgrades: true
  fishing: true
  customMobs: true
  artifactXP: true
  bossArena: true

resource-pack:
  mode: AUTO
  autoHost: true
  hostPort: 8192
  force: true
  prompt: "<gold>Этот сервер использует кастомный ресурс-пак!"
  hash: ""

dungeons:
  enabled: true
  scanOnStartup: true
  lootInjection: true
  specialChests: true
  bossSpawners: true

crafting:
  enabled: true
  altarEnabled: true
  keepIngredients: false

artifacts:
  defaultAmount: 1
  dropOnDeath: false
  soulbind: false
  allowInAnvil: false

database:
  enabled: true
  type: SQLITE
  host: localhost
  port: 3306
  database: wasteland_artifacts
  user: root
  password: ""
  poolSize: 10

gui:
  rows: 6
  title: "<dark_gray>Артефакты Пустоши"
  fill-glass: true

lang:
  locale: ru_RU
