void_hammer:
  type: direct_artifact
  enabled: true
  pattern:
    - "VT "
    - " SH"
    - " S "
  ingredients:
    V: "custom:void_tentacle"
    T: "custom:titan_armor_plate"
    S: STICK
    H: NETHERITE_AXE
  result: void_hammer
