# ─── Wasteland Artifacts — Примеры артефактов ───
# Все артефакты полностью рабочие. Надевай — и эффекты применяются.
#
# 📝 ФОРМАТ ИНГРЕДИЕНТОВ В РЕЦЕПТАХ:
#
# 1) Простой материал:
#    A: DIAMOND
#
# 2) Артефакт из этого плагина:
#    B: "artifact:fire_sword"
#
# 3) Кастомный предмет из custom_items.yml:
#    C: "custom:fire_core"
#
# 4) Расширенный формат (с именем/лором для матчинга других плагинов):
#    D:
#      type: DIAMOND_SWORD
#      name: "<red>Эпичный Меч"           # имя предмета (MiniMessage)
#      lore:                               # лор (опционально)
#        - "<gray>Легендарный меч"
#      customModelData: 123                # кастомная модель (опционально)
#
# Вариант 4 использует ItemStack.isSimilar() для матчинга.
# Это позволяет использовать предметы из ЛЮБЫХ других плагинов
# (MMOItems, ItemsAdder, Nexo, Oraxen, EcoItems и т.д.)
# Достаточно чтобы у предмета было совпадающее имя + лор + CMD.

